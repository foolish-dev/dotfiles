# ~/.config/starship.toml - Starship prompt configuration
# Managed by dotfiles installer
# https://starship.rs/config/

# =============================================================================
# GENERAL
# =============================================================================

# Wait 10 milliseconds for starship to check files under the current directory
scan_timeout = 10

# Disable the blank line at the start of the prompt
add_newline = true

# A minimal left prompt
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$docker_context\
$package\
$python\
$nodejs\
$rust\
$golang\
$java\
$cmd_duration\
$line_break\
$jobs\
$battery\
$time\
$status\
$character"""

# Move the rest of the prompt to the right
right_format = """$memory_usage"""

# =============================================================================
# CHARACTER
# =============================================================================

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# =============================================================================
# DIRECTORY
# =============================================================================

[directory]
style = "bold blue"
read_only = " "
truncation_length = 4
truncate_to_repo = true
fish_style_pwd_dir_length = 1

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"~/dev" = ""
"~/projects" = ""

# =============================================================================
# GIT
# =============================================================================

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
style = "bold yellow"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

# =============================================================================
# USER & HOST
# =============================================================================

[username]
style_user = "bold green"
style_root = "bold red"
format = "[$user]($style)@"
disabled = false
show_always = false

[hostname]
ssh_only = true
style = "bold cyan"
format = "[$hostname]($style):"

# =============================================================================
# COMMAND DURATION
# =============================================================================

[cmd_duration]
min_time = 2_000  # Show if command takes longer than 2 seconds
format = "[$duration]($style) "
style = "bold yellow"
show_milliseconds = false
show_notifications = false

# =============================================================================
# LANGUAGES
# =============================================================================

[python]
symbol = " "
style = "bold yellow"
format = '[${symbol}(${version} )(\($virtualenv\) )]($style)'
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"
detect_files = ["package.json", ".nvmrc"]

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[lua]
symbol = " "
style = "bold blue"
format = "[$symbol($version )]($style)"

[ruby]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[php]
symbol = " "
style = "bold purple"
format = "[$symbol($version )]($style)"

# =============================================================================
# CONTAINERS & CLOUD
# =============================================================================

[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[kubernetes]
symbol = "☸ "
style = "bold blue"
format = '[$symbol$context( \($namespace\))]($style) '
disabled = true

[aws]
symbol = "  "
style = "bold yellow"
format = '[$symbol($profile )(\($region\) )]($style)'
disabled = true

[gcloud]
symbol = " "
style = "bold blue"
format = '[$symbol$account(@$domain)(\($region\))]($style) '
disabled = true

# =============================================================================
# PACKAGE
# =============================================================================

[package]
symbol = " "
style = "bold 208"
format = "[$symbol$version]($style) "
disabled = false

# =============================================================================
# SYSTEM
# =============================================================================

[battery]
full_symbol = "🔋 "
charging_symbol = "⚡️ "
discharging_symbol = "💀 "
unknown_symbol = "❓ "
empty_symbol = "❗ "

[[battery.display]]
threshold = 10
style = "bold red"

[[battery.display]]
threshold = 30
style = "bold yellow"

[memory_usage]
disabled = false
threshold = 75
symbol = " "
style = "bold dimmed white"
format = "[$symbol${ram}( | ${swap})]($style)"

[time]
disabled = true
format = '[\[ $time \]]($style) '
style = "bold dimmed white"
time_format = "%H:%M"

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = "✖ "
style = "bold red"

[jobs]
symbol = "✦ "
style = "bold blue"
number_threshold = 1
format = "[$symbol$number]($style) "

# =============================================================================
# LINE BREAK
# =============================================================================

[line_break]
disabled = false

# =============================================================================
# SHELL
# =============================================================================

[shell]
disabled = true
bash_indicator = "bsh"
zsh_indicator = "zsh"
fish_indicator = "fsh"
powershell_indicator = "psh"
format = "[$indicator]($style) "
