# ~/.tmux.conf - Tmux configuration
# Managed by dotfiles installer

# =============================================================================
# GENERAL SETTINGS
# =============================================================================

# Set prefix to Ctrl+a (like screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Display messages for 4 seconds
set -g display-time 4000

# Refresh status line every 5 seconds
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Don't wait for escape sequences
set -sg escape-time 0

# Enable 256 colors and true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Set default shell
set -g default-shell $SHELL

# =============================================================================
# KEY BINDINGS
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navigate panes with Alt+arrow (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Resize panes with Ctrl+arrow
bind -r C-h resize-pane -L
bind -r C-j resize-pane -D
bind -r C-k resize-pane -U
bind -r C-l resize-pane -R

# Navigate windows with Shift+arrow (no prefix)
bind -n S-Left previous-window
bind -n S-Right next-window

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Toggle synchronize panes
bind S setw synchronize-panes

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# Break pane to new window
bind b break-pane

# Join pane from another window
bind J choose-window 'join-pane -h -s "%%"'

# Toggle zoom
bind z resize-pane -Z

# Clear screen and history
bind C-l send-keys 'C-l'
bind C-k clear-history

# =============================================================================
# COPY MODE
# =============================================================================

# Vi copy mode
setw -g mode-keys vi

# Enter copy mode
bind Enter copy-mode
bind -n M-Enter copy-mode

# Copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

# Copy to system clipboard
if-shell "command -v xclip" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"
if-shell "command -v xsel" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xsel --clipboard --input'"
if-shell "command -v pbcopy" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"

# Paste from clipboard
bind p paste-buffer
bind P choose-buffer

# =============================================================================
# APPEARANCE
# =============================================================================

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style bg=colour235,fg=colour137

# Left status
set -g status-left-length 40
set -g status-left '#[fg=colour233,bg=colour245,bold] #S #[fg=colour245,bg=colour235,nobold]'

# Right status
set -g status-right-length 60
set -g status-right '#[fg=colour240]│ #[fg=colour245]%H:%M #[fg=colour240]│ #[fg=colour245]%d-%b-%y #[fg=colour245,bg=colour235]#[fg=colour233,bg=colour245,bold] #H '

# Window status
setw -g window-status-current-style bg=colour238,fg=colour81,bold
setw -g window-status-current-format ' #I:#W#F '

setw -g window-status-style bg=colour235,fg=colour138,none
setw -g window-status-format ' #I:#W#F '

setw -g window-status-bell-style bg=colour1,fg=colour255,bold

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour81

# Message style
set -g message-style bg=colour166,fg=colour232,bold

# =============================================================================
# PLUGINS (TPM - Tmux Plugin Manager)
# =============================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
run '~/.tmux/plugins/tpm/tpm'

# =============================================================================
# LOCAL CONFIG
# =============================================================================

# Source local config if it exists
if-shell "test -f ~/.tmux.conf.local" "source-file ~/.tmux.conf.local"
