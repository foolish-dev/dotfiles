# zram swap for GZ302 (32-128 GB unified memory variants).
#
# Strix Halo shares DRAM between CPU and iGPU, so swapping to disk is both
# slow and wears the NVMe. A large zstd-compressed zram swap lets the
# kernel reclaim cold pages into RAM at ~3:1 compression (effectively
# 2.5-3x the declared size) without touching the SSD.
#
# zram-size = 13846 MB matches the 32GB SKU (~50% of physical memory).
# zram-generator automatically creates a device named /dev/zram0 and wires
# up the swapon at boot -- no further systemd units needed.
#
# Paired with /etc/sysctl.d/99-gz302-zram.conf, which tunes the VM layer
# to actually prefer this zram device over staying RAM-resident.

[zram0]
zram-size = 13846
compression-algorithm = zstd
swap-priority = 100
fs-type = swap
