# Created by: archinstall
# Created on: 2026-04-18_21-49-18
# PARTUUID below is machine-specific -- deploy.sh guards this entry behind
# DEPLOY_LOADER=1. Do not copy to /boot on a different install.
#
# Microcode: loaded via the mkinitcpio `microcode` hook (baked into
# initramfs-linux.img). The old separate initrd line for intel/amd-ucode is
# redundant when the hook is present and was actively broken on this AMD box
# (file /boot/intel-ucode.img didn't exist).
#
# amd_pstate=active  -> per-core EPP driver (standard Strix Halo tuning).
#                       Replaces `guided` for snappier scaling on Zen 5.
# amdgpu.dcdebugmask=0xe12 -> display-core debug mask used on Strix Halo to
#                       work around early-kernel DCN 3.5 issues. Safe to keep.
# zswap.enabled=0    -> we use zram exclusively (see systemd/zram-generator.conf).
title   Arch Linux (linux)
linux   /vmlinuz-linux
initrd  /initramfs-linux.img
options root=PARTUUID=7cbe1002-4707-4e98-bca4-64f993c46543 zswap.enabled=0 rw rootfstype=ext4 amd_pstate=active amdgpu.dcdebugmask=0xe12
