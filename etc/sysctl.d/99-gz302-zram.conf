# VM tuning for zram-based swap on Strix Halo (GZ302).
#
# Default Linux tuning assumes spinning-rust or even SSD swap is slow, so
# it rarely swaps (swappiness=60). With zram, swap is RAM-compressed at
# ~3:1 and is faster than reading cold pages from disk cache. Push the
# kernel to prefer zram aggressively -- the effective memory footprint
# shrinks instead of trashing the fs cache under pressure.

# Aggressively swap cold anon pages to zram (default 60).
# Upstream Fedora/Ubuntu with zram ship 180; we match.
vm.swappiness = 180

# Swap fully-inactive pages before evicting dirty file-cache pages.
# Default is 100 (equal weighting). Bias toward keeping file cache.
vm.vfs_cache_pressure = 50

# Zram page-cluster of 0 means each swap-in is exactly one page instead
# of a read-ahead cluster of 8. With compressed swap there is no
# rotational latency to amortise, so single-page I/O is faster.
vm.page-cluster = 0

# Allow reasonably aggressive dirty-page writeback on the unified-memory
# APU where GPU workloads can pin large allocations. Keeps dirty pages
# from accumulating and stalling fsyncs.
vm.dirty_background_ratio = 5
vm.dirty_ratio = 15
