# =============================================================================
# keyd -- Key remapping for Niri + Noctalia
# /etc/keyd/default.conf
# =============================================================================
# Super tap (press + release alone) sends F13 -> bound in niri to toggle
# the Noctalia app launcher. Super held with other keys still works as Mod.
# Docs: https://github.com/rvaiya/keyd

[ids]
*

[main]
leftmeta = overload(meta, f13)
rightmeta = overload(meta, f13)
