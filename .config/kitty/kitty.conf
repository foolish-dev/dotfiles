# =============================================================================
# Kitty Terminal -- Dark Hacker Theme (Tokyo Night)
# ~/.config/kitty/kitty.conf
# =============================================================================

# ── Font ───────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0
disable_ligatures never

# ── Cursor ─────────────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
shell_integration     enabled

# ── Scrollback ─────────────────────────────────────────────────────────────
scrollback_lines       10000
scrollback_pager       less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 5.0

# ── Mouse ──────────────────────────────────────────────────────────────────
copy_on_select         clipboard
mouse_hide_wait        3.0
url_style              curly
open_url_with          default
detect_urls            yes
strip_trailing_spaces  smart

# ── Window ─────────────────────────────────────────────────────────────────
window_padding_width   6
hide_window_decorations yes
confirm_os_window_close 0
remember_window_size    no
initial_window_width    120c
initial_window_height   36c
enabled_layouts         tall,fat,grid,splits,stack
background_opacity      0.92
dynamic_background_opacity yes

# ── Tab bar ────────────────────────────────────────────────────────────────
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
active_tab_font_style   bold
inactive_tab_font_style normal

# ── Bell ───────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0

# ── Wayland ────────────────────────────────────────────────────────────────
linux_display_server    wayland
wayland_titlebar_color  background

# ── Color scheme (pywal-managed, Tokyo Night fallback) ─────────────────────
# pywal regenerates ~/.cache/wal/colors-kitty.conf on wallpaper change.
# Run `wallpaper <image>` to update.  Tokyo Night values below are the
# static fallback used before the first `wal` run.

foreground              #c0caf5
background              #1a1b26
selection_foreground    #c0caf5
selection_background    #33467c
cursor                  #c0caf5
cursor_text_color       #1a1b26

color0   #15161e
color8   #414868
color1   #f7768e
color9   #f7768e
color2   #9ece6a
color10  #9ece6a
color3   #e0af68
color11  #e0af68
color4   #7aa2f7
color12  #7aa2f7
color5   #bb9af7
color13  #bb9af7
color6   #7dcfff
color14  #7dcfff
color7   #a9b1d6
color15  #c0caf5

active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #545c7e
inactive_tab_background #1a1b26

# pywal override -- loaded after fallback so it wins when present
include ~/.cache/wal/colors-kitty.conf

# ── Keyboard shortcuts ────────────────────────────────────────────────────
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+n     new_window_with_cwd
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+l     next_layout
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0
map ctrl+shift+f     toggle_fullscreen
map ctrl+shift+u     kitten unicode_input
