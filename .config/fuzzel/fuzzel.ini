# =============================================================================
# Fuzzel Launcher -- Dark Hacker Theme
# ~/.config/fuzzel/fuzzel.ini
# =============================================================================

[main]
font=JetBrainsMono Nerd Font:size=11
dpi-aware=auto
prompt="  > "
icon-theme=Papirus-Dark
icons-enabled=yes
fields=name,generic,comment,categories,filename,keywords
terminal=kitty -e
layer=overlay
lines=12
width=45
horizontal-pad=12
vertical-pad=8
inner-pad=4
image-size-ratio=0.5
letter-spacing=0

[colors]
background=1a1b26ee
text=c0caf5ff
prompt=7aa2f7ff
placeholder=545c7eff
input=c0caf5ff
match=9ece6aff
selection=33467cff
selection-text=c0caf5ff
selection-match=9ece6aff
counter=545c7eff
border=7aa2f7ff

[border]
width=2
radius=12

[dmenu]
mode=text
exit-immediately-if-empty=no
