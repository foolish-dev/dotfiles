# =============================================================================
# Neofetch Config -- Arch Linux / BlackArch / Niri / Cybersec
# ~/.config/neofetch/config.conf
# =============================================================================

print_info() {
    info title
    info underline

    info "OS"          distro
    info "Kernel"      kernel
    info "Uptime"      uptime
    info "Packages"    packages
    info "Shell"       shell
    info "Resolution"  resolution
    info "WM"          wm
    info "Terminal"    term
    info "CPU"         cpu
    info "Memory"      memory
    info "Local IP"    local_ip

    info cols
}

# ── Title ──────────────────────────────────────────────────────────────────
title_fqdn="off"

# ── Kernel ─────────────────────────────────────────────────────────────────
kernel_shorthand="on"

# ── Uptime ─────────────────────────────────────────────────────────────────
uptime_shorthand="tiny"

# ── Memory ─────────────────────────────────────────────────────────────────
memory_percent="on"
memory_unit="gib"

# ── Packages ───────────────────────────────────────────────────────────────
package_managers="on"

# ── Shell ──────────────────────────────────────────────────────────────────
shell_path="off"
shell_version="on"

# ── CPU ────────────────────────────────────────────────────────────────────
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

# ── Resolution ─────────────────────────────────────────────────────────────
refresh_rate="on"

# ── GPU ────────────────────────────────────────────────────────────────────
gpu_brand="on"
gpu_type="all"

# ── Disk ───────────────────────────────────────────────────────────────────
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"

# ── IP ─────────────────────────────────────────────────────────────────────
local_ip_interface=('auto')

# ── Colors ─────────────────────────────────────────────────────────────────
# Use pywal colors when available, else fall back to Tokyo Night blues
colors=(4 6 3 5 1 2)

bold="on"
underline_enabled="on"
underline_char="-"
separator=" "

# ── Color blocks ───────────────────────────────────────────────────────────
block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

# ── Progress bars ──────────────────────────────────────────────────────────
bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

# ── Image / ASCII ──────────────────────────────────────────────────────────
image_backend="ascii"
image_source="auto"        # uses distro logo (Arch)
ascii_distro="arch_small"
ascii_colors=(4 6 1 8 3 7) # Tokyo Night: blue cyan red grey yellow white
ascii_bold="on"

# ── Misc ───────────────────────────────────────────────────────────────────
stdout="off"
