<svg xmlns="http://www.w3.org/2000/svg" width="900" height="100" viewBox="0 0 900 100">
  <defs>
    <linearGradient id="lbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#24283b"/>
    </linearGradient>
    <linearGradient id="lacc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7"/>
      <stop offset="50%" style="stop-color:#bb9af7"/>
      <stop offset="100%" style="stop-color:#7dcfff"/>
    </linearGradient>
    <filter id="lglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="lgrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#414868" stroke-width="0.2" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="900" height="100" rx="10" fill="url(#lbg)"/>
  <rect width="900" height="100" rx="10" fill="url(#lgrid)"/>
  <rect x="60" y="14" width="780" height="1" rx="0.5" fill="url(#lacc)" opacity="0.5"/>

  <!-- Grid/launcher icon -->
  <g transform="translate(68, 28)" filter="url(#lglow)">
    <rect x="0" y="0" width="44" height="40" rx="6" fill="none" stroke="#bb9af7" stroke-width="1.5"/>
    <rect x="8"  y="8"  width="10" height="10" rx="2" fill="#bb9af7" opacity="0.5"/>
    <rect x="22" y="8"  width="10" height="10" rx="2" fill="#7aa2f7" opacity="0.5"/>
    <rect x="8"  y="22" width="10" height="10" rx="2" fill="#7dcfff" opacity="0.5"/>
    <rect x="22" y="22" width="10" height="10" rx="2" fill="#9ece6a" opacity="0.5"/>
  </g>

  <text x="130" y="52" font-family="'JetBrains Mono','Fira Code',monospace" font-size="22" font-weight="700" fill="#c0caf5" filter="url(#lglow)">Noctalia</text>
  <text x="130" y="71" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#565f89" letter-spacing="2">155 PINNED APPS  ·  21 CATEGORIES  ·  WAYLAND</text>

  <!-- Stat badges -->
  <g font-family="'JetBrains Mono',monospace" font-size="10">
    <rect x="560" y="35" width="72" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="596" y="51" text-anchor="middle" fill="#7aa2f7">155 apps</text>
    <rect x="644" y="35" width="80" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="684" y="51" text-anchor="middle" fill="#bb9af7">21 categories</text>
    <rect x="736" y="35" width="64" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="768" y="51" text-anchor="middle" fill="#7dcfff">Super+Space</text>
  </g>

  <rect x="60" y="85" width="780" height="1" rx="0.5" fill="url(#lacc)" opacity="0.5"/>
  <circle cx="840" cy="85" r="2.5" fill="#7aa2f7" opacity="0.7"/>
  <circle cx="851" cy="85" r="2.5" fill="#bb9af7" opacity="0.7"/>
</svg>
