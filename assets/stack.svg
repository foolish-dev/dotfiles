  </g>
  <text x="85" y="82" font-family="'JetBrains Mono', monospace" font-size="12" fill="#c0caf5" font-weight="600">Arch Linux</text>
  <text x="50" y="105" font-family="'JetBrains Mono', monospace" font-size="9" fill="#565f89">+ BlackArch + Chaotic AUR</text>
  <text x="50" y="120" font-family="'JetBrains Mono', monospace" font-size="9" fill="#565f89">300+ packages, 19 categories</text>

