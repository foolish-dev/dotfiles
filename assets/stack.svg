  <!-- Background -->
  <rect width="900" height="540" rx="12" fill="url(#sbg)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#565f89" letter-spacing="6">ARCHITECTURE</text>

  <!-- === Row 1: System Layer === -->

  <!-- Arch Linux -->
  <g filter="url(#cardshadow)">
    <rect x="30" y="55" width="170" height="80" rx="10" fill="#1a1b26" stroke="#414868" stroke-width="1"/>
  </g>
  <g filter="url(#iconglow)">
