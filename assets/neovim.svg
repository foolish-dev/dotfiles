<svg xmlns="http://www.w3.org/2000/svg" width="900" height="100" viewBox="0 0 900 100">
  <defs>
    <linearGradient id="nbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#24283b"/>
    </linearGradient>
    <linearGradient id="nacc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7"/>
      <stop offset="50%" style="stop-color:#bb9af7"/>
      <stop offset="100%" style="stop-color:#7dcfff"/>
    </linearGradient>
    <filter id="nglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="ngrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#414868" stroke-width="0.2" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="900" height="100" rx="10" fill="url(#nbg)"/>
  <rect width="900" height="100" rx="10" fill="url(#ngrid)"/>
  <rect x="60" y="14" width="780" height="1" rx="0.5" fill="url(#nacc)" opacity="0.5"/>

  <!-- Neovim icon (stylized N) -->
  <g transform="translate(68, 28)" filter="url(#nglow)">
    <rect x="0" y="0" width="44" height="40" rx="6" fill="none" stroke="#7aa2f7" stroke-width="1.5"/>
    <polygon points="10,32 10,8 20,24 34,8 34,32" fill="none" stroke="#7aa2f7" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="10,8 20,24 34,8" fill="#7aa2f7" opacity="0.15"/>
  </g>

  <text x="130" y="52" font-family="'JetBrains Mono','Fira Code',monospace" font-size="22" font-weight="700" fill="#c0caf5" filter="url(#nglow)">Neovim</text>
  <text x="130" y="71" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#565f89" letter-spacing="2">LSP  ·  DAP  ·  TREESITTER  ·  LAZY.NVIM</text>

  <!-- Plugin badges -->
  <g font-family="'JetBrains Mono',monospace" font-size="10">
    <rect x="530" y="35" width="68" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="564" y="51" text-anchor="middle" fill="#7aa2f7">telescope</text>
    <rect x="610" y="35" width="58" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="639" y="51" text-anchor="middle" fill="#bb9af7">nvim-cmp</text>
    <rect x="680" y="35" width="60" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="710" y="51" text-anchor="middle" fill="#7dcfff">diffview</text>
    <rect x="752" y="35" width="48" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="776" y="51" text-anchor="middle" fill="#9ece6a">noice</text>
  </g>

  <rect x="60" y="85" width="780" height="1" rx="0.5" fill="url(#nacc)" opacity="0.5"/>
  <circle cx="840" cy="85" r="2.5" fill="#7aa2f7" opacity="0.7"/>
  <circle cx="851" cy="85" r="2.5" fill="#bb9af7" opacity="0.7"/>
</svg>
