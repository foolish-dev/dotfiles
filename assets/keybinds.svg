<svg xmlns="http://www.w3.org/2000/svg" width="900" height="100" viewBox="0 0 900 100">
  <defs>
    <linearGradient id="kbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#24283b"/>
    </linearGradient>
    <linearGradient id="kacc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7"/>
      <stop offset="50%" style="stop-color:#bb9af7"/>
      <stop offset="100%" style="stop-color:#7dcfff"/>
    </linearGradient>
    <filter id="kglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="kgrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#414868" stroke-width="0.2" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="900" height="100" rx="10" fill="url(#kbg)"/>
  <rect width="900" height="100" rx="10" fill="url(#kgrid)"/>
  <rect x="60" y="14" width="780" height="1" rx="0.5" fill="url(#kacc)" opacity="0.5"/>

  <!-- Keyboard icon -->
  <g transform="translate(68, 32)" filter="url(#kglow)">
    <rect x="0" y="0" width="44" height="30" rx="4" fill="none" stroke="#7aa2f7" stroke-width="1.5"/>
    <rect x="5"  y="6"  width="6" height="6" rx="1" fill="#7aa2f7" opacity="0.4"/>
    <rect x="14" y="6"  width="6" height="6" rx="1" fill="#7aa2f7" opacity="0.4"/>
    <rect x="23" y="6"  width="6" height="6" rx="1" fill="#7aa2f7" opacity="0.4"/>
    <rect x="32" y="6"  width="6" height="6" rx="1" fill="#7aa2f7" opacity="0.4"/>
    <rect x="5"  y="16" width="6" height="6" rx="1" fill="#bb9af7" opacity="0.4"/>
    <rect x="14" y="16" width="24" height="6" rx="1" fill="#bb9af7" opacity="0.6"/>
  </g>

  <text x="130" y="54" font-family="'JetBrains Mono','Fira Code',monospace" font-size="22" font-weight="700" fill="#c0caf5" filter="url(#kglow)">Keybinds</text>
  <text x="130" y="73" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#565f89" letter-spacing="2">NIRI  ·  TMUX  ·  NEOVIM</text>

  <!-- Key badges right -->
  <g font-family="'JetBrains Mono',monospace" font-size="10">
    <rect x="560" y="35" width="60" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="590" y="51" text-anchor="middle" fill="#7aa2f7">Super</text>
    <rect x="632" y="35" width="36" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="650" y="51" text-anchor="middle" fill="#bb9af7">C-a</text>
    <rect x="680" y="35" width="56" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="708" y="51" text-anchor="middle" fill="#7dcfff">Space</text>
    <rect x="748" y="35" width="48" height="22" rx="4" fill="#24283b" stroke="#3b4261" stroke-width="1"/>
    <text x="772" y="51" text-anchor="middle" fill="#9ece6a">&lt;leader&gt;</text>
  </g>

  <rect x="60" y="85" width="780" height="1" rx="0.5" fill="url(#kacc)" opacity="0.5"/>
  <circle cx="840" cy="85" r="2.5" fill="#7aa2f7" opacity="0.7"/>
  <circle cx="851" cy="85" r="2.5" fill="#bb9af7" opacity="0.7"/>
</svg>
