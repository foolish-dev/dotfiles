<svg xmlns="http://www.w3.org/2000/svg" width="900" height="100" viewBox="0 0 900 100">
  <defs>
    <linearGradient id="lbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1e2e7"/>
      <stop offset="100%" style="stop-color:#d5d6db"/>
    </linearGradient>
    <linearGradient id="lacc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e7de9"/>
      <stop offset="50%" style="stop-color:#9854f1"/>
      <stop offset="100%" style="stop-color:#007197"/>
    </linearGradient>
    <filter id="lglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="lgrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#a8aecb" stroke-width="0.2" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="900" height="100" rx="10" fill="url(#lbg)"/>
  <rect width="900" height="100" rx="10" fill="url(#lgrid)"/>
  <rect x="60" y="14" width="780" height="1" rx="0.5" fill="url(#lacc)" opacity="0.5"/>

  <!-- Grid/launcher icon -->
  <g transform="translate(68, 28)" filter="url(#lglow)">
    <rect x="0" y="0" width="44" height="40" rx="6" fill="none" stroke="#9854f1" stroke-width="1.5"/>
    <rect x="8"  y="8"  width="10" height="10" rx="2" fill="#9854f1" opacity="0.5"/>
    <rect x="22" y="8"  width="10" height="10" rx="2" fill="#2e7de9" opacity="0.5"/>
    <rect x="8"  y="22" width="10" height="10" rx="2" fill="#007197" opacity="0.5"/>
    <rect x="22" y="22" width="10" height="10" rx="2" fill="#587539" opacity="0.5"/>
  </g>

  <text x="130" y="52" font-family="'JetBrains Mono','Fira Code',monospace" font-size="22" font-weight="700" fill="#3760bf" filter="url(#lglow)">Noctalia</text>
  <text x="130" y="71" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#6172b0" letter-spacing="2">155 PINNED APPS  ·  21 CATEGORIES  ·  WAYLAND</text>

  <!-- Stat badges -->
  <g font-family="'JetBrains Mono',monospace" font-size="10">
    <rect x="560" y="35" width="72" height="22" rx="4" fill="#d5d6db" stroke="#a8aecb" stroke-width="1"/>
    <text x="596" y="51" text-anchor="middle" fill="#2e7de9">155 apps</text>
    <rect x="644" y="35" width="80" height="22" rx="4" fill="#d5d6db" stroke="#a8aecb" stroke-width="1"/>
    <text x="684" y="51" text-anchor="middle" fill="#9854f1">21 categories</text>
    <rect x="736" y="35" width="64" height="22" rx="4" fill="#d5d6db" stroke="#a8aecb" stroke-width="1"/>
    <text x="768" y="51" text-anchor="middle" fill="#007197">Super+Space</text>
  </g>

  <rect x="60" y="85" width="780" height="1" rx="0.5" fill="url(#lacc)" opacity="0.5"/>
  <circle cx="840" cy="85" r="2.5" fill="#2e7de9" opacity="0.7"/>
  <circle cx="851" cy="85" r="2.5" fill="#9854f1" opacity="0.7"/>
</svg>
